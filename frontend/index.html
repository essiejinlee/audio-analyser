<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Analyser</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .image-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .image-container img {
            width: 300px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <h2>Audio Analysis</h2>

    <input type="file" id="fileInput">
    <button onclick="upload()">Analyse</button>

    <h3>Results</h3>

    <div class="image-container">
        <img id="waveform">
        <img id="spectrogram">
        <img id="pitch_plot">
    </div>

    <p id="tempo"></p>
    <p id="pitch"></p>

    <script src="app.js"></script>

</body>
</html>
